<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1f24" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="A primer on the Noble Eightfold Path — the eight interdependent factors of Buddhist practice."
    />
    <meta property="og:title" content="8fold" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="A structured introduction to the Noble Eightfold Path."
    />
    <meta name="twitter:card" content="summary" />
    <title>8fold — The Noble Eightfold Path</title>
    <!-- Pre-paint theme bootstrap (consumer-owned, SSR-skipped). Sets .dark and the
         brand custom properties from localStorage before Vue hydrates. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'dark' && t !== 'light') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
          var hRaw = localStorage.getItem('brand-hue');
          if (hRaw !== null) {
            var h = Number(hRaw);
            if (Number.isFinite(h) && h >= 0 && h <= 360) {
              document.documentElement.style.setProperty('--brand-hue', String(h));
            }
          }
          var iRaw = localStorage.getItem('brand-intensity');
          if (iRaw !== null) {
            var i = Number(iRaw);
            if (Number.isFinite(i) && i >= 0 && i <= 100) {
              document.documentElement.style.setProperty('--brand-intensity', String(i / 100));
            }
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/scripts/main.ts"></script>
  </head>
  <body class="bg-gray-25 font-sans text-gray-900 antialiased dark:bg-gray-50">
    <div id="app"></div>
  </body>
</html>
