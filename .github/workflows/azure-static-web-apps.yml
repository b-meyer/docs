name: Azure Static Web Apps

on:
  push:
    branches: [release]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    # Runs from the repo root (the pnpm-workspace root). `vp check` lints the whole
    # workspace via the root vite.config.ts; `vp run tcm#build` builds just the TCM
    # app. Only apps/tcm is deployed today; app_location is repo-root-relative.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint/format/type-check the whole workspace (one canonical root config),
      # then unit tests, then build only the TCM app. `vp run <app>#build` invokes
      # that app's `build` task (`vite-ssg build`); `vp build` directly would run
      # Vite+'s SPA build and bypass vite-ssg.
      - name: Check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp run -r test

      - name: Build
        run: pnpm exec vp run tcm#build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_RIVER_0E1FD7A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # With skip_app_build=true, app_location IS the pre-built artifact
          # to upload, and output_location must be empty. Confusingly, the
          # Microsoft docs only mention this on the "Skip build" page; the
          # default examples elsewhere set both, which uploads the whole repo
          # (and blows past the SWA Free 250 MB limit via node_modules).
          # https://learn.microsoft.com/azure/static-web-apps/build-configuration#skip-building-front-end-app
          app_location: 'apps/tcm/dist'
          output_location: ''
          skip_app_build: true
